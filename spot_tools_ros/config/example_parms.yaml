/**:
    ros__parameters:
        fixed_frame: "map"
        spot_ip: "10.0.0.3"
        bosdyn_client_username: "$(env BOSDYN_CLIENT_USERNAME)"
        bosdyn_client_password: "$(env BOSDYN_CLIENT_PASSWORD)"
        use_fake_spot_interface: true
        use_fake_spot_pose: true
        fake_spot_x: 0
        fake_spot_y: 0
        fake_spot_yaw: 0
        follower_lookahead: 2
        # mid-level planner
        mid_level_planner_type: "astar"   # "astar" or "identity"
        lookahead_distance: 50            # grid cells
        occupancy_inflation_radius: 0.2   # meters
        use_fake_path_plan: false
        # cost map: penalizes paths near obstacles (adds proximity cost to A* g_cost)
        use_cost_map: false
        cost_map_safe_distance: 1.0       # meters; cells within this distance incur extra cost
        cost_map_nearest_obstacle_cost: 5.0  # max extra cost per step at zero distance (Gaussian RBF)
